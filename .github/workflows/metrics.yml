# .github/workflows/metrics.yml
# Generates github-metrics.svg and commits it to your repo on a schedule.
# Requires a CLASSIC Personal Access Token saved as the secret METRICS_TOKEN.
# (Fine-grained tokens are NOT supported by this action.)

name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"        # daily at 00:00 UTC
  workflow_dispatch:            # lets you run it manually from the Actions tab
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: codeHannan
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Karachi
          config_padding: 6%

          # ── Base sections (commit calendar, activity, repo & community stats) ──
          base: header, activity, community, repositories, metadata
          base_indepth: yes

          # ── Short bio / introduction (reinforces the CS-student identity) ──
          plugin_introduction: yes

          # ── Isometric 3D contribution calendar (the signature visual) ──
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ── Most-used languages ──
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8

          # ── Coding habits (time-of-day & per-day charts + facts) ──
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # ── Technologies & starred topics, shown as an icon grid ──
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0

          # ── Lines of code added / removed ──
          plugin_lines: yes

          # ── Open issues / pull-request follow-up ──
          plugin_followup: yes

          # ── Order the panels top-to-bottom ──
          config_order: >-
            base.header, introduction, base.activity, isocalendar,
            languages, habits, topics, lines, followup,
            base.community, base.repositories, base.metadata
